<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .frame { opacity: 0; image-rendering: pixelated; }
      .f0 { animation: drag-frames 0.56s infinite steps(1, end); animation-delay: 0s; }
      .f1 { animation: drag-frames 0.56s infinite steps(1, end); animation-delay: -0.14s; }
      .f2 { animation: drag-frames 0.56s infinite steps(1, end); animation-delay: -0.28s; }
      .f3 { animation: drag-frames 0.56s infinite steps(1, end); animation-delay: -0.42s; }
      @keyframes drag-frames {
        0%, 25% { opacity: 1; }
        25.01%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <image class="frame f0" href="../png/clawd-react-drag/dree_drag_0.png" x="64" y="128" width="128" height="128" />
  <image class="frame f1" href="../png/clawd-react-drag/dree_drag_1.png" x="64" y="128" width="128" height="128" />
  <image class="frame f2" href="../png/clawd-react-drag/dree_drag_2.png" x="64" y="128" width="128" height="128" />
  <image class="frame f3" href="../png/clawd-react-drag/dree_drag_3.png" x="64" y="128" width="128" height="128" />
</svg>
