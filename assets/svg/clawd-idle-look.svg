<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      :root { --duration: 1s; }
      .frame {
        opacity: 0;
        animation-name: frame-step;
        animation-duration: var(--duration);
        animation-timing-function: steps(1, end);
        animation-iteration-count: infinite;
        image-rendering: pixelated;
      }
      .f0 { animation-delay: calc(var(--duration) * 0 / -8); }
      .f1 { animation-delay: calc(var(--duration) * 1 / -8); }
      .f2 { animation-delay: calc(var(--duration) * 2 / -8); }
      .f3 { animation-delay: calc(var(--duration) * 3 / -8); }
      .f4 { animation-delay: calc(var(--duration) * 4 / -8); }
      .f5 { animation-delay: calc(var(--duration) * 5 / -8); }
      .f6 { animation-delay: calc(var(--duration) * 6 / -8); }
      .f7 { animation-delay: calc(var(--duration) * 7 / -8); }
      @keyframes frame-step {
        0%, 12.5% { opacity: 1; }
        12.5001%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <image class="frame f0" href="../png/clawd-idle-look/dree_look_0.png" x="64" y="128" width="128" height="128" />
  <image class="frame f1" href="../png/clawd-idle-look/dree_look_1.png" x="64" y="128" width="128" height="128" />
  <image class="frame f2" href="../png/clawd-idle-look/dree_look_2.png" x="64" y="128" width="128" height="128" />
  <image class="frame f3" href="../png/clawd-idle-look/dree_look_3.png" x="64" y="128" width="128" height="128" />
  <image class="frame f4" href="../png/clawd-idle-look/dree_look_4.png" x="64" y="128" width="128" height="128" />
  <image class="frame f5" href="../png/clawd-idle-look/dree_look_5.png" x="64" y="128" width="128" height="128" />
  <image class="frame f6" href="../png/clawd-idle-look/dree_look_6.png" x="64" y="128" width="128" height="128" />
  <image class="frame f7" href="../png/clawd-idle-look/dree_look_7.png" x="64" y="128" width="128" height="128" />
</svg>
