<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .frame { opacity: 0; image-rendering: pixelated; }
      .f0 { animation: happy-frames 0.8s infinite steps(1, end); animation-delay: 0s; }
      .f1 { animation: happy-frames 0.8s infinite steps(1, end); animation-delay: -0.2s; }
      .f2 { animation: happy-frames 0.8s infinite steps(1, end); animation-delay: -0.4s; }
      .f3 { animation: happy-frames 0.8s infinite steps(1, end); animation-delay: -0.6s; }
      @keyframes happy-frames {
        0%, 25% { opacity: 1; }
        25.01%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <image class="frame f0" href="../png/clawd-happy/dree_happy_0.png" x="64" y="128" width="128" height="128" />
  <image class="frame f1" href="../png/clawd-happy/dree_happy_1.png" x="64" y="128" width="128" height="128" />
  <image class="frame f2" href="../png/clawd-happy/dree_happy_2.png" x="64" y="128" width="128" height="128" />
  <image class="frame f3" href="../png/clawd-happy/dree_happy_3.png" x="64" y="128" width="128" height="128" />
</svg>
