<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .frame { opacity: 0; image-rendering: pixelated; }
      .f0 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: 0s; }
      .f1 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: -0.16s; }
      .f2 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: -0.32s; }
      .f3 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: -0.48s; }
      .f4 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: -0.64s; }
      .f5 { animation: error-frames 0.96s infinite steps(1, end); animation-delay: -0.80s; }
      @keyframes error-frames {
        0%, 16.66% { opacity: 1; }
        16.67%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <image class="frame f0" href="../png/clawd-error/dree_error_0.png" x="64" y="128" width="128" height="128" />
  <image class="frame f1" href="../png/clawd-error/dree_error_1.png" x="64" y="128" width="128" height="128" />
  <image class="frame f2" href="../png/clawd-error/dree_error_2.png" x="64" y="128" width="128" height="128" />
  <image class="frame f3" href="../png/clawd-error/dree_error_3.png" x="64" y="128" width="128" height="128" />
  <image class="frame f4" href="../png/clawd-error/dree_error_4.png" x="64" y="128" width="128" height="128" />
  <image class="frame f5" href="../png/clawd-error/dree_error_5.png" x="64" y="128" width="128" height="128" />
</svg>
