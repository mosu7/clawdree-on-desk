<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      :root { --duration: 1.5s; }
      .frame {
        opacity: 0;
        animation-name: frame-step;
        animation-duration: var(--duration);
        animation-timing-function: steps(1, end);
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        image-rendering: pixelated;
      }
      .f0 { animation-delay: calc(var(--duration) * 0 / 9); }
      .f1 { animation-delay: calc(var(--duration) * 1 / 9); }
      .f2 { animation-delay: calc(var(--duration) * 2 / 9); }
      .f3 { animation-delay: calc(var(--duration) * 3 / 9); }
      .f4 { animation-delay: calc(var(--duration) * 4 / 9); }
      .f5 { animation-delay: calc(var(--duration) * 5 / 9); }
      .f6 { animation-delay: calc(var(--duration) * 6 / 9); }
      .f7 { animation-delay: calc(var(--duration) * 7 / 9); }
      .f8 { animation-delay: calc(var(--duration) * 8 / 9); }
      @keyframes frame-step {
        0%, 11.111% { opacity: 1; }
        11.112%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <image class="frame f0" href="../png/clawd-waking/dree_waking_0.png" x="64" y="128" width="128" height="128" />
  <image class="frame f1" href="../png/clawd-waking/dree_waking_1.png" x="64" y="128" width="128" height="128" />
  <image class="frame f2" href="../png/clawd-waking/dree_waking_2.png" x="64" y="128" width="128" height="128" />
  <image class="frame f3" href="../png/clawd-waking/dree_waking_3.png" x="64" y="128" width="128" height="128" />
  <image class="frame f4" href="../png/clawd-waking/dree_waking_4.png" x="64" y="128" width="128" height="128" />
  <image class="frame f5" href="../png/clawd-waking/dree_waking_5.png" x="64" y="128" width="128" height="128" />
  <image class="frame f6" href="../png/clawd-waking/dree_waking_6.png" x="64" y="128" width="128" height="128" />
  <image class="frame f7" href="../png/clawd-waking/dree_waking_7.png" x="64" y="128" width="128" height="128" />
  <image class="frame f8" href="../png/clawd-waking/dree_waking_8.png" x="64" y="128" width="128" height="128" />
</svg>
